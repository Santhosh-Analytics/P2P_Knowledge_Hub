
app_name = "P2P Knowledge Hub"

[logs]
log_file_fmt = "%(asctime)s | %(levelname)-8s | %(name)s:%(funcName)s:%(lineno)d | %(message)s"
log_to_file = true
log_level = "debug"
log_to_console = true
capturewarnings = true
rich_tracebacks = false

[exceptions]
default_error_message = "An unexpected error occured."
